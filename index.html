<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockHeat - 板块ETF热度雷达</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

  :root {
    --bg-primary: #06060d;
    --bg-secondary: #0c0c16;
    --bg-card: #111118;
    --bg-card-hover: #181824;
    --border: #1a1a2a;
    --border-active: #2a2a42;
    --text-primary: #e4e4ec;
    --text-secondary: #8888a4;
    --text-muted: #4a4a5e;
    --accent-green: #00e676;
    --accent-red: #ff3d5a;
    --accent-cyan: #00e0ff;
    --accent-purple: #b388ff;
    --accent-orange: #ff9100;
    --accent-yellow: #ffd740;
    --heat-cold: #448aff;
    --heat-warm: #ff6d00;
    --heat-hot: #ff1744;
    --xhs-color: #ff2442;
    --dy-color: #00f2fe;
    --wb-color: #ff8200;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 800px 600px at 15% 0%, rgba(0, 224, 255, 0.04) 0%, transparent 60%),
      radial-gradient(ellipse 600px 800px at 85% 30%, rgba(179, 136, 255, 0.03) 0%, transparent 60%),
      radial-gradient(ellipse 700px 500px at 50% 80%, rgba(0, 230, 118, 0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .grid-bg {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 64px 64px;
    pointer-events: none; z-index: 0;
  }

  .container { max-width:1480px; margin:0 auto; padding:20px 24px 40px; position:relative; z-index:1; }

  /* Header */
  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 0 20px; border-bottom:1px solid var(--border);
    margin-bottom:20px; flex-wrap:wrap; gap:16px;
  }
  .logo { display:flex; align-items:center; gap:14px; }
  .logo-icon {
    width:44px; height:44px;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
    border-radius:13px; display:flex; align-items:center; justify-content:center;
    font-size:22px; box-shadow: 0 0 24px rgba(0,224,255,0.25);
    position:relative; overflow:hidden;
  }
  .logo-icon::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.15));
  }
  .logo-text {
    font-family: 'Geist Mono', 'Noto Sans SC', monospace;
    font-size:24px; font-weight:700; letter-spacing:-1px;
    background: linear-gradient(135deg, var(--text-primary) 20%, var(--accent-cyan));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .logo-sub { font-size:11px; color:var(--text-muted); letter-spacing:2.5px; text-transform:uppercase; }

  .market-ticker { display:flex; gap:12px; flex-wrap:wrap; }
  .ticker-item {
    display:flex; align-items:center; gap:10px;
    padding:10px 16px; background:var(--bg-card);
    border-radius:10px; border:1px solid var(--border);
    font-family:'Geist Mono', monospace; font-size:13px;
    transition: all 0.25s; cursor:default;
  }
  .ticker-item:hover { border-color:var(--border-active); background:var(--bg-card-hover); }
  .ticker-name { color:var(--text-secondary); font-size:11px; }
  .ticker-price { font-weight:700; font-size:15px; }
  .ticker-change { font-size:12px; padding:3px 8px; border-radius:5px; font-weight:600; }
  .ticker-change.up { color:var(--accent-green); background:rgba(0,230,118,0.1); }
  .ticker-change.down { color:var(--accent-red); background:rgba(255,61,90,0.1); }

  /* Status Bar */
  .status-bar {
    display:flex; align-items:center; gap:14px;
    padding:10px 18px; background:var(--bg-card);
    border-radius:10px; border:1px solid var(--border);
    font-size:12px; margin-bottom:22px; flex-wrap:wrap;
  }
  .status-dot { width:8px; height:8px; border-radius:50%; background:var(--accent-green); animation:pulse 2s infinite; box-shadow:0 0 8px var(--accent-green); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
  .status-label { color:var(--text-secondary); }
  .status-value { color:var(--text-primary); font-family:'Geist Mono',monospace; }
  .status-sep { color:var(--text-muted); }

  /* Platform Summary */
  .platform-summary { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px,1fr)); gap:14px; margin-bottom:22px; }
  .platform-card {
    position:relative; background:var(--bg-card);
    border:1px solid var(--border); border-radius:14px;
    padding:20px; overflow:hidden; transition:all 0.3s;
    cursor:pointer;
  }
  .platform-card:hover { border-color:var(--border-active); background:var(--bg-card-hover); transform:translateY(-2px); }
  .platform-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .platform-card.xhs::before { background:linear-gradient(90deg, var(--xhs-color), #ff6b81); }
  .platform-card.douyin::before { background:linear-gradient(90deg, var(--dy-color), #4facfe); }
  .platform-card.weibo::before { background:linear-gradient(90deg, var(--wb-color), #ffb940); }
  .platform-card.aggregate::before { background:linear-gradient(90deg, var(--accent-purple), var(--accent-cyan)); }
  .platform-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .platform-name { font-size:14px; font-weight:600; display:flex; align-items:center; gap:8px; }
  .platform-icon { width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:15px; }
  .platform-count { font-family:'Geist Mono',monospace; font-size:12px; color:var(--text-secondary); }
  .platform-metrics { display:flex; gap:18px; margin-bottom:12px; }
  .metric-item { flex:1; }
  .metric-label { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; }
  .metric-value { font-family:'Geist Mono',monospace; font-size:15px; font-weight:600; }
  .metric-value.h3 { color:var(--heat-hot); }
  .metric-value.h2 { color:var(--heat-warm); }
  .metric-value.h1 { color:var(--heat-cold); }
  .platform-trends { display:flex; gap:6px; flex-wrap:wrap; }
  .trend-tag {
    font-size:10px; padding:3px 9px; border-radius:4px;
    background:rgba(255,255,255,0.04); color:var(--text-secondary);
    border:1px solid rgba(255,255,255,0.06); white-space:nowrap;
  }
  .trend-tag.hot { color:var(--accent-red); background:rgba(255,61,90,0.1); border-color:rgba(255,61,90,0.2); }

  /* Section Title */
  .section-title {
    font-size:16px; font-weight:700; margin-bottom:16px;
    display:flex; align-items:center; gap:10px; letter-spacing:0.5px;
  }
  .section-title::before {
    content:''; width:4px; height:20px;
    background:var(--accent-cyan); border-radius:2px;
  }

  /* Table */
  /* Filter Bar */
  .filter-bar {
    display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap;
  }
  .filter-btn {
    padding:7px 16px; border-radius:8px; border:1px solid var(--border);
    background:var(--bg-card); color:var(--text-secondary);
    font-size:12px; font-family:'Noto Sans SC', sans-serif; cursor:pointer;
    transition:all 0.2s; white-space:nowrap;
  }
  .filter-btn:hover { border-color:var(--border-active); color:var(--text-primary); background:var(--bg-card-hover); }
  .filter-btn.active { border-color:var(--accent-cyan); color:var(--accent-cyan); background:rgba(0,224,255,0.08); box-shadow:0 0 12px rgba(0,224,255,0.12); }
  .filter-btn .count { font-family:'Geist Mono',monospace; font-size:11px; margin-left:4px; opacity:0.7; }

  /* 宝妈指数 */
  .mom-index-card {
    background: linear-gradient(135deg, rgba(255,105,180,0.06), rgba(255,182,193,0.04), rgba(255,215,0,0.03));
    border: 1px solid rgba(255,105,180,0.2);
    border-radius: 16px; padding: 20px 24px; margin-bottom: 22px;
    position: relative; overflow: hidden;
  }
  .mom-index-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, #ff69b4, #ffb6c1, #ffd700, #ff69b4);
    animation: momShimmer 3s ease-in-out infinite;
  }
  @keyframes momShimmer {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }
  .mom-header {
    display: flex; align-items: center; gap: 14px; margin-bottom: 16px;
  }
  .mom-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, #ff69b4, #ffb6c1);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; box-shadow: 0 0 20px rgba(255,105,180,0.25);
  }
  .mom-title {
    font-size: 17px; font-weight: 700; letter-spacing: 0.5px;
    background: linear-gradient(135deg, #ff69b4, #ffb6c1, #ffd700);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .mom-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .mom-score {
    margin-left: auto; font-family: 'Geist Mono', monospace;
    font-size: 36px; font-weight: 700;
    background: linear-gradient(135deg, #ff69b4, #ffb6c1, #ffd700);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .mom-sectors {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px;
  }
  .mom-sector-tag {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; border-radius: 10px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    font-size: 13px; transition: all 0.2s;
  }
  .mom-sector-tag:hover {
    background: rgba(255,105,180,0.08); border-color: rgba(255,105,180,0.2);
  }
  .mom-sector-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .mom-sector-name { flex: 1; font-size: 12px; color: var(--text-secondary); }
  .mom-sector-heat {
    font-family: 'Geist Mono', monospace; font-size: 12px; font-weight: 600;
  }
  .mom-sector-arrow { font-size: 11px; }
  .mom-signal {
    margin-top: 14px; padding: 10px 16px;
    background: rgba(255,105,180,0.06); border-radius: 10px;
    border: 1px solid rgba(255,105,180,0.12);
    font-size: 13px; display: flex; align-items: center; gap: 8px;
  }

  .table-container {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:14px; overflow:hidden; margin-bottom:22px;
  }
  .table-header {
    display:grid;
    grid-template-columns:52px 1.35fr 80px 105px 115px 72px 78px 95px;
    padding:13px 22px; background:rgba(255,255,255,0.015);
    border-bottom:1px solid var(--border);
    font-size:11px; color:var(--text-muted);
    text-transform:uppercase; letter-spacing:1px; font-weight:500;
  }
  .table-row {
    display:grid;
    grid-template-columns:52px 1.35fr 80px 105px 115px 72px 78px 95px;
    padding:14px 22px; border-bottom:1px solid var(--border);
    font-size:13px; align-items:center;
    transition:all 0.2s; cursor:pointer; position:relative;
  }
  .table-row:hover { background:rgba(255,255,255,0.02); }
  .table-row:last-child { border-bottom:none; }
  .rank-num { font-family:'Geist Mono',monospace; font-size:15px; font-weight:700; color:var(--text-secondary); text-align:center; }
  .rank-num.r1 { color:#ffd740; }
  .rank-num.r2 { color:#bdbdbd; }
  .rank-num.r3 { color:#ff8a65; }
  .sector-name { font-weight:600; display:flex; align-items:center; gap:8px; }
  .sector-name .etf-name { font-size:11px; color:var(--text-muted); font-weight:400; }
  .sector-change { font-family:'Geist Mono',monospace; font-weight:600; }
  .sector-change.pos { color:var(--accent-green); }
  .sector-change.neg { color:var(--accent-red); }

  .heat-cell { display:flex; align-items:center; gap:8px; }
  .heat-bar { flex:1; height:6px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
  .heat-bar-fill {
    height:100%; border-radius:3px;
    transition:width 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .heat-bar-fill.l5 { background:linear-gradient(90deg,#ff1744,#ff6d00); box-shadow:0 0 14px rgba(255,23,68,0.5); }
  .heat-bar-fill.l4 { background:linear-gradient(90deg,#ff6d00,#ff9100); box-shadow:0 0 8px rgba(255,109,0,0.4); }
  .heat-bar-fill.l3 { background:linear-gradient(90deg,#ff9100,#ffd740); }
  .heat-bar-fill.l2 { background:linear-gradient(90deg,#ffd740,#76ff03); }
  .heat-bar-fill.l1 { background:#448aff; }
  .heat-score-val { font-family:'Geist Mono',monospace; font-size:14px; font-weight:700; min-width:44px; text-align:right; }
  .heat-score-val.s5 { color:#ff1744; }
  .heat-score-val.s4 { color:#ff6d00; }
  .heat-score-val.s3 { color:#ff9100; }
  .heat-score-val.s2 { color:#ffd740; }
  .heat-score-val.s1 { color:#448aff; }

  .sent-badge {
    display:inline-block; padding:3px 9px; border-radius:4px;
    font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;
  }
  .sent-badge.bullish { color:var(--accent-green); background:rgba(0,230,118,0.1); border:1px solid rgba(0,230,118,0.2); }
  .sent-badge.bearish { color:var(--accent-red); background:rgba(255,61,90,0.1); border:1px solid rgba(255,61,90,0.2); }
  .sent-badge.neutral { color:var(--text-secondary); background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); }

  .signal-cell { display:flex; align-items:center; gap:8px; }
  .signal-dot { width:10px; height:10px; border-radius:50%; }
  .signal-dot.buy { background:var(--accent-green); box-shadow:0 0 10px rgba(0,230,118,0.5); animation:pulse 1.5s infinite; }
  .signal-dot.sell { background:var(--accent-red); box-shadow:0 0 10px rgba(255,61,90,0.5); animation:pulse 1.5s infinite; }
  .signal-dot.hold { background:var(--accent-yellow); box-shadow:0 0 8px rgba(255,215,64,0.4); }
  .signal-dot.watch { background:var(--accent-cyan); box-shadow:0 0 8px rgba(0,224,255,0.4); }
  .signal-label { font-size:12px; font-weight:600; }
  .signal-label.buy { color:var(--accent-green); }
  .signal-label.sell { color:var(--accent-red); }
  .signal-label.hold { color:var(--accent-yellow); }
  .signal-label.watch { color:var(--accent-cyan); }

  .mention-dots { display:flex; gap:5px; }
  .mdot { width:7px; height:7px; border-radius:50%; opacity:0.35; transition:opacity 0.3s; }
  .mdot.on { opacity:1; }
  .mdot.xh { background:var(--xhs-color); }
  .mdot.dy { background:var(--dy-color); }
  .mdot.wb { background:var(--wb-color); }

  .data-tag {
    display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;
    font-weight:600;letter-spacing:0.3px;vertical-align:middle;margin-left:4px;
  }
  .data-tag.real{color:#00e676;background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.2);}
  .data-tag.sim{color:#ff9100;background:rgba(255,145,0,0.08);border:1px solid rgba(255,145,0,0.15);}
  .data-tag.mixed{color:#ffd740;background:rgba(255,215,64,0.08);border:1px solid rgba(255,215,64,0.15);}

  .sim-hint{font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:4px;}
  .sim-hint .dot{width:5px;height:5px;border-radius:50%;}
  .sim-hint .dot.sim{background:#ff9100;}
  .sim-hint .dot.real{background:#00e676;}

  /* Detail Panel */
  .detail-panel { display:grid; grid-template-columns:2fr 1fr; gap:14px; margin-bottom:22px; }
  .detail-card {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:14px; padding:22px;
  }
  .detail-card-title {
    font-size:13px; font-weight:600; color:var(--text-secondary);
    margin-bottom:18px; text-transform:uppercase; letter-spacing:1px;
    display:flex; align-items:center; gap:8px;
  }
  .sentiment-chart { display:flex; align-items:flex-end; gap:3px; height:90px; padding:0 4px; }
  .chart-col { display:flex; flex-direction:column; align-items:center; gap:2px; flex:1; }
  .chart-bar { width:100%; border-radius:2px 2px 0 0; transition:height 0.5s; }
  .chart-bar.positive { background:var(--accent-green); opacity:0.65; }
  .chart-bar.negative { background:var(--accent-red); opacity:0.45; }
  .hot-topics { display:flex; flex-direction:column; gap:9px; }
  .ht-item {
    display:flex; align-items:center; gap:10px;
    padding:10px 13px; background:rgba(255,255,255,0.015);
    border-radius:8px; border:1px solid rgba(255,255,255,0.04);
    transition:all 0.2s;
  }
  .ht-item:hover { background:rgba(255,255,255,0.03); border-color:rgba(255,255,255,0.08); }
  .ht-rank { font-family:'Geist Mono',monospace; font-size:13px; font-weight:700; color:var(--text-muted); width:22px; }
  .ht-rank.hot { color:var(--accent-red); }
  .ht-content { flex:1; font-size:13px; }
  .ht-source { font-size:10px; padding:2px 7px; border-radius:3px; background:rgba(255,255,255,0.04); }
  .ht-heat { font-family:'Geist Mono',monospace; font-size:13px; font-weight:600; color:var(--accent-orange); }

  /* Detail Modal */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.7);
    display:flex; align-items:center; justify-content:center;
    z-index:100; opacity:0; pointer-events:none; transition:opacity 0.3s;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.active { opacity:1; pointer-events:all; }
  .modal {
    background:var(--bg-card); border:1px solid var(--border-active);
    border-radius:18px; padding:28px; max-width:600px; width:90%;
    max-height:80vh; overflow-y:auto; position:relative;
    box-shadow:0 24px 80px rgba(0,0,0,0.6);
  }
  .modal-close {
    position:absolute; top:16px; right:16px;
    width:32px; height:32px; border-radius:50%;
    background:rgba(255,255,255,0.06); border:none;
    color:var(--text-secondary); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s;
  }
  .modal-close:hover { background:rgba(255,255,255,0.12); color:var(--text-primary); }
  .modal-sector-name { font-size:22px; font-weight:700; margin-bottom:6px; }
  .modal-sector-code { font-size:13px; color:var(--text-muted); font-family:'Geist Mono',monospace; }
  .modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px; }
  .modal-stat {
    padding:14px; background:rgba(255,255,255,0.02);
    border-radius:10px; border:1px solid rgba(255,255,255,0.05);
  }
  .modal-stat-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; }
  .modal-stat-value { font-size:18px; font-weight:700; font-family:'Geist Mono',monospace; margin-top:4px; }
  .modal-platform-breakdown { margin-top:20px; }
  .modal-platform-label { font-size:12px; color:var(--text-secondary); margin-bottom:10px; }
  .modal-bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .modal-bar-label { font-size:12px; width:50px; }
  .modal-bar-track { flex:1; height:8px; background:rgba(255,255,255,0.06); border-radius:4px; overflow:hidden; }
  .modal-bar-fill { height:100%; border-radius:4px; transition:width 0.6s; }

  /* Animations */
  @keyframes flash-update { 0%{background:rgba(0,224,255,0.08)} 100%{background:transparent} }
  .flash { animation:flash-update 0.8s ease-out; }
  @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .slide-in { animation:slideIn 0.4s ease-out; }

  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  @media (max-width:900px) {
    .container { padding:12px; }
    .table-header, .table-row { grid-template-columns:38px 1fr 62px 78px 80px 68px; padding:11px 14px; font-size:12px; }
    .table-header>:nth-child(7),.table-row>:nth-child(7) { display:none; }
    .table-header>:nth-child(8),.table-row>:nth-child(8) { display:none; }
    .detail-panel { grid-template-columns:1fr; }
    .platform-summary { grid-template-columns:1fr 1fr; }
    .market-ticker { gap:8px; }

        // Longer keyword match = higher score
        const score = kw.length / topic.length * 100;
        maxScore = Math.max(maxScore, score);
      }
    }
    if (maxScore > 0) {
      // Determine sentiment from topic text
      let sentiment = 0.5; // neutral
      for (const bk of SENTIMENT_KEYWORDS.bullish) {
        if (topic.includes(bk)) { sentiment = 0.75; break; }
      }
      for (const bk of SENTIMENT_KEYWORDS.bearish) {
        if (topic.includes(bk)) { sentiment = 0.25; break; }
      }
      results.push({
        sector,
        relevance: parseFloat((maxScore * (heatValue / 10000000)).toFixed(2)),
        sentiment,
        topic,
        heatValue,
      });
    }
  }
  return results;
}

// ─── Sentiment Engine ───────────────────
function genSentiment(sectorName, platform, ts) {
  // Check for real data from this platform
  const realData = platform === 'weibo' ? weiboRealData : platform === 'douyin' ? douyinRealData : null;

  if (realData && realData.length > 0) {
    const sectorKwMap = SECTOR_KEYWORDS[sectorName] || [];
    let matchedTopics = 0;
    let weightedSentiment = 0.5;
    let totalHeatInfluence = 0;

    for (const topic of realData) {
      for (const kw of sectorKwMap) {
        if (topic.name.includes(kw)) {
          matchedTopics++;
          let topicSent = 0.5;
          for (const bk of SENTIMENT_KEYWORDS.bullish) {
            if (topic.name.includes(bk)) { topicSent = 0.75; break; }
          }
          for (const bk of SENTIMENT_KEYWORDS.bearish) {
            if (topic.name.includes(bk)) { topicSent = 0.25; break; }
          }
          const influence = (Math.min(topic.rank, 51) ? (51 - topic.rank) / 50 : 0);
          totalHeatInfluence += topic.heat * Math.max(0, influence);
          weightedSentiment = weightedSentiment * 0.7 + topicSent * 0.3;
          break;
        }
      }
    }

    if (matchedTopics > 0) {
      return {
        mentions: Math.floor(totalHeatInfluence * 0.1 + 100),
        bullishRatio: parseFloat(weightedSentiment.toFixed(3)),
        intensity: 0.7 + matchedTopics * 0.05,
        realData: true,
      };
    }
  }

  // Fall back to simulation (using real market context for better accuracy)
  const seed = hash(sectorName + '_' + platform) + Math.floor(ts / 90000);
  const rng = srand(seed);

  const bias = { xiaohongshu:{bull:0.54, vol:1.3}, douyin:{bull:0.49, vol:1.6}, weibo:{bull:0.46, vol:1.0} };
  const pb = bias[platform];

  // Market context influence: if market is down, sentiment skews more bearish
  const mktAvgChange = (marketIndices.sh.change + marketIndices.sz.change + marketIndices.cy.change + marketIndices.kc.change) / 4;
  const mktBias = mktAvgChange > 1 ? 0.1 : mktAvgChange < -1 ? -0.1 : 0;

  const eventSpike = (ts % 300000 < 60000) ? 1.5 : 1.0;
  const baseVol = 80 + rng() * 900 * pb.vol * eventSpike;
  const bullRatio = Math.min(0.92, Math.max(0.08, pb.bull + mktBias + (rng() - 0.5) * 0.45));
  const intensity = 0.55 + rng() * 0.45;

  return {
    mentions: Math.floor(baseVol),
    bullishRatio: parseFloat(bullRatio.toFixed(3)),
    intensity: parseFloat(intensity.toFixed(2)),
    realData: false,
  };
}

function calcHeatScore(sentiments, priceChg) {
  let totalW=0, sentW=0;
  for (const [plat, d] of Object.entries(sentiments)) {
    const w = plat==='douyin' ? 0.4 : plat==='weibo' ? 0.3 : 0.3;
    totalW += d.mentions * w;
    sentW += d.bullishRatio * d.intensity * w;
  }
  const mentionSc = Math.min(100, (Math.log10(totalW+1) / Math.log10(2500)) * 100);
  const sentSc = sentW * 100;
  const momSc = Math.min(100, Math.max(0, (priceChg + 5) * 10));
  let comp = mentionSc * 0.28 + sentSc * 0.42 + momSc * 0.30;
  comp += (Math.random() - 0.5) * 6;
  return Math.min(100, Math.max(0, Math.round(comp)));
}

function getSignal(heat, chg, sent) {
  if (heat >= 78 && chg > 0 && sent > 0.6)  return {sig:'buy',   txt:'强烈买入', lvl:3};
  if (heat >= 65 && chg > -1 && sent > 0.5) return {sig:'watch', txt:'建议关注', lvl:2};
  if (heat >= 48 && sent > 0.44)             return {sig:'hold',  txt:'持有观察', lvl:1};
  if (heat < 38 || (chg < -3.5 && sent < 0.38)) return {sig:'sell', txt:'建议回避', lvl:-1};
  return {sig:'hold', txt:'观望', lvl:0};
}

function getLevel(sc) { return sc>=80?5:sc>=65?4:sc>=50?3:sc>=35?2:1; }
function getLevelClass(sc) { return 's'+(sc>=80?5:sc>=65?4:sc>=50?3:sc>=35?2:1); }

// ─── Generate Data ──────────────────────
function generateData(ts) {
  const data = SECTORS.map(s => {
    const rng = srand(hash(s.code + Math.floor(ts/120000)));

    // Price change: prioritize real ETF data
    let priceChg = 0;
    if (etfRealData[s.etf]) {
      priceChg = etfRealData[s.etf].change;
    } else {
      const trends = {
        '半导体':0.4,'人工智能':0.6,'新能源车':-0.1,'光伏':-0.2,'国防军工':0.1,
        '5G通信':0.25,'生物医药':-0.3,'白酒消费':0.05,'机器人':0.65,'锂电池':-0.05,
        '银行':0.2,'证券':-0.1,'医药医疗':-0.25,'消费电子':0.2,'低空经济':0.85,
        '算力':0.75,'电力':0.15,'创新药':-0.15,'数据要素':0.45,'固态电池':0.55,
      };
      const base = (trends[s.name] || 0);
      priceChg = parseFloat((base*2 + (rng()-0.5)*s.volatility*10).toFixed(2));
    }

    const sentiments = {};
    for (const p of ['xiaohongshu','douyin','weibo']) {
      sentiments[p] = genSentiment(s.name, p, ts);
    }

    const heat = calcHeatScore(sentiments, priceChg);
    const avgSent = (sentiments.xiaohongshu.bullishRatio + sentiments.douyin.bullishRatio + sentiments.weibo.bullishRatio) / 3;
    const totalMent = sentiments.xiaohongshu.mentions + sentiments.douyin.mentions + sentiments.weibo.mentions;
    const signal = getSignal(heat, priceChg, avgSent);

    return { ...s, priceChg, sentiments, heat, avgSent:parseFloat(avgSent.toFixed(3)), totalMent, signal };
  });
  data.sort((a,b) => b.heat - a.heat);
  return data;
}

function genHotTopics(ts) {
  const allTopics = [];

  // Add real Weibo topics
  if (weiboRealData && weiboRealData.length > 0) {
    const stockRelated = weiboRealData
      .filter(t => {
        const allKw = Object.values(SECTOR_KEYWORDS).flat();
        return allKw.some(kw => t.name.includes(kw)) ||
          SENTIMENT_KEYWORDS.bullish.some(bk => t.name.includes(bk)) ||
          SENTIMENT_KEYWORDS.bearish.some(bk => t.name.includes(bk));
      })
      .map(t => ({
        keyword: t.name, heat: Math.min(99, Math.floor(t.heat / 10000 * 3)),
        platform: 'weibo', mentions: Math.floor(t.heat),
      }));
    allTopics.push(...stockRelated);
  }

  // Add real Douyin topics
  if (douyinRealData && douyinRealData.length > 0) {
    const stockRelated = douyinRealData
      .filter(t => {
        const allKw = Object.values(SECTOR_KEYWORDS).flat();
        return allKw.some(kw => t.name.includes(kw)) ||
          SENTIMENT_KEYWORDS.bullish.some(bk => t.name.includes(bk)) ||
          SENTIMENT_KEYWORDS.bearish.some(bk => t.name.includes(bk));
      })
      .map(t => ({
        keyword: t.name, heat: Math.min(99, Math.floor(t.heat / 10000 * 3)),
        platform: 'douyin', mentions: Math.floor(t.heat),
      }));
    allTopics.push(...stockRelated);
  }

  if (allTopics.length >= 3) {
    return allTopics.sort((a, b) => b.mentions - a.mentions).slice(0, 8);
  }

  // Show top real topics from either platform
  if (weiboRealData && weiboRealData.length > 0) {
    return weiboRealData.slice(0, 8).map(t => ({
      keyword: t.name, heat: Math.min(99, Math.floor(t.heat / 10000 * 3)),
      platform: 'weibo', mentions: Math.floor(t.heat),
    }));
  }
  if (douyinRealData && douyinRealData.length > 0) {
    return douyinRealData.slice(0, 8).map(t => ({
      keyword: t.name, heat: Math.min(99, Math.floor(t.heat / 10000 * 3)),
      platform: 'douyin', mentions: Math.floor(t.heat),
    }));
  }

  // Fallback simulation
  const rng = srand(Math.floor(ts/60000));
  return TOPIC_KEYWORDS
    .map((kw,i) => ({
      keyword:kw, heat:Math.floor(55+rng()*45),
      platform:['xiaohongshu','douyin','weibo'][Math.floor(rng()*3)],
      mentions:Math.floor(800+rng()*10000),
    }))
    .sort((a,b)=>b.heat-a.heat).slice(0,8);
}

function genSentChart(ts) {
  const data = [];
  for (let i=0;i<24;i++) {

    data.push({pos:Math.floor(35+rng()*45), neg:Math.floor(8+rng()*35)});

  return data;
}

// ─── 宝妈指数 ─────────────────────────────
function calcMomIndex() {
  const allSocialData = { weibo: weiboRealData, douyin: douyinRealData };
  const results = MOM_SECTORS.map(sector => {
    let totalMentions = 0;
    let weightedSentiment = 0.5;

    for (const [platform, topics] of Object.entries(allSocialData)) {
      if (!topics) continue;
      for (const topic of topics) {
        for (const kw of sector.keywords) {
          if (topic.name && topic.name.includes(kw)) {
            totalMentions += topic.heat || 1000;
            let sent = 0.5;
            for (const bk of SENTIMENT_KEYWORDS.bullish) {
              if (topic.name.includes(bk)) { sent = 0.75; break; }
            }
            for (const bk of SENTIMENT_KEYWORDS.bearish) {
              if (topic.name.includes(bk)) { sent = 0.25; break; }
            }
            weightedSentiment = weightedSentiment * 0.6 + sent * 0.4;
            break;
          }
        }
      }
    }

    // Simulate if no real data
    if (totalMentions === 0) {
      const rng = srand(hash(sector.id + Math.floor(Date.now() / 300000)));
      totalMentions = 300 + rng() * 2000;
      weightedSentiment = 0.35 + rng() * 0.5;
    }

    return {
      ...sector,
      mentions: Math.floor(totalMentions),
      sentiment: parseFloat(weightedSentiment.toFixed(3)),
      heat: Math.min(100, Math.floor((Math.log10(totalMentions + 1) / Math.log10(5000)) * 100)),
    };
  });

  // Calculate composite score
  const avgHeat = Math.round(results.reduce((s, r) => s + r.heat, 0) / results.length);
  const avgSent = results.reduce((s, r) => s + r.sentiment, 0) / results.length;
  const totalBuzz = results.reduce((s, r) => s + r.mentions, 0);

  const signalLevel = avgHeat >= 70 ? 'high' : avgHeat >= 40 ? 'medium' : 'low';
  const signal = MOM_SIGNALS[signalLevel];

  return { sectors: results, score: avgHeat, sentiment: avgSent, totalBuzz, signal, signalLevel };
}

function renderMomIndex(ts) {
  const data = calcMomIndex();
  const container = document.getElementById('momIndex');
  if (!container) return;

  // Update score
  document.getElementById('momScore').textContent = data.score;

  // Update sectors
  const sectorsHtml = data.sectors
    .sort((a, b) => b.heat - a.heat)
    .map(s => {
      const heatColor = s.heat >= 70 ? 'var(--heat-hot)' : s.heat >= 45 ? 'var(--heat-warm)' : 'var(--heat-cold)';
      return `
        <div class="mom-sector-tag" title="${s.name}: ${s.mentions.toLocaleString()} 讨论量, ${(s.sentiment*100).toFixed(0)}% 看多">
          <div class="mom-sector-dot" style="background:${s.color};box-shadow:0 0 6px ${s.color}"></div>
          <span class="mom-sector-name">${s.icon} ${s.name}</span>
          <span class="mom-sector-heat" style="color:${heatColor}">${s.heat}°</span>
          <span class="mom-sector-arrow" style="color:${s.sentiment >= 0.5 ? 'var(--accent-green)' : 'var(--accent-red)'}">
            ${s.sentiment >= 0.55 ? '↑' : s.sentiment <= 0.45 ? '↓' : '→'}
          </span>
        </div>`;
    }).join('');

  // Add signal
  const signalHtml = data.signal ? `
    <div class="mom-signal" style="background:${data.signal.bg};border-color:${data.signal.color}33">
      <span style="font-size:16px;">${data.signalLevel === 'high' ? '🔥' : data.signalLevel === 'medium' ? '📊' : '❄️'}</span>
      <span style="color:${data.signal.color};">${data.signal.text}</span>
    </div>` : '';

  // Check if mom index has any real data
  const hasRealMomData = data.sectors.some(s => s.mentions > 500 && (weiboRealData || douyinRealData));
  const momDataTag = hasRealMomData ? '<span class="data-tag real">部分实时</span>' : '<span class="data-tag sim">模拟</span>';

  container.innerHTML = `
    <div class="mom-header">
      <span class="mom-icon">👩‍👧</span>
      <div>
        <div class="mom-title">宝妈指数 <span style="font-size:10px;color:var(--text-muted);font-weight:400;">MOM INVEST INDEX</span> ${momDataTag}</div>
        <div class="mom-subtitle">宝妈炒股热门板块 · ${data.totalBuzz.toLocaleString()} 讨论量 · ${(data.sentiment*100).toFixed(0)}% 看多</div>
      </div>
      <div class="mom-score">${data.score}</div>
    </div>
    <div class="mom-sectors">${sectorsHtml}</div>
    ${signalHtml}
  `;
}

// ─── Update Loop ──────────────────────────
let updateTimer, countdownTimer;

function renderAll(ts) {
  const data = generateData(ts);
  window._lastData = data;

  renderTicker();
  renderMomIndex(ts);
  renderPlatforms(data);
  renderTable(data);
  renderChart(ts);
  renderTopics(ts);
  updateFilterCounts(data);

  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');

  const realSources = [];
  if (dataSrcReal) realSources.push('行情');
  if (weiboRealData) realSources.push('微博热搜');
  if (douyinRealData) realSources.push('抖音热搜');
  if (backendAvailable) realSources.unshift('后端');

  if (backendAvailable && realSources.length >= 3) {
    document.getElementById('dataSourceStatus').textContent = '全实时 (' + realSources.join('+') + ')';
    document.getElementById('dataSourceStatus').style.color = '#00e676';
  } else if (realSources.length >= 2) {
    document.getElementById('dataSourceStatus').textContent = '实时数据 (' + realSources.join('+') + ')';
    document.getElementById('dataSourceStatus').style.color = 'var(--accent-green)';
  } else if (realSources.length === 1) {
    document.getElementById('dataSourceStatus').textContent = '部分实时 (' + realSources[0] + ')';
    document.getElementById('dataSourceStatus').style.color = 'var(--accent-yellow)';
  } else {
    document.getElementById('dataSourceStatus').textContent = '仿真数据';
    document.getElementById('dataSourceStatus').style.color = 'var(--accent-yellow)';
  }
}

async function doUpdate() {
  countdown = 30;
  // Try backend first, then fallback to direct API calls
  const backendData = await fetchBackendData();
  if (!backendData) {
    await Promise.all([
      fetchMarketIndices(),
      fetchETFData(),
      fetchWeiboHotSearch(),
      fetchDouyinHotSearch(),
    ]);
  } else {
    // Still try to get social data
    await Promise.all([
      fetchWeiboHotSearch(),
      fetchDouyinHotSearch(),
    ]);
  }
  renderAll(Date.now());
}

function updateCountdownUI() {
  document.getElementById('updateCountdown').textContent = countdown + 's';
}

async function init() {
  // Filter button handlers
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      if (window._lastData) {
        renderTable(window._lastData);
      }
    });
  });

  // Try backend first
  const backendData = await fetchBackendData();
  if (!backendData) {
    await Promise.all([
      fetchMarketIndices(),
      fetchETFData(),
      fetchWeiboHotSearch(),
      fetchDouyinHotSearch(),
    ]);
  } else {
    await Promise.all([
      fetchWeiboHotSearch(),
      fetchDouyinHotSearch(),
    ]);
  }
  renderAll(Date.now());

  countdownTimer = setInterval(() => {
    countdown--;
    if (countdown <= 0) countdown = 0;
    updateCountdownUI();
  }, 1000);

  updateTimer = setInterval(async () => {
    countdown = 30;
    const backendData = await fetchBackendData();
    if (!backendData) {
      await Promise.all([
        fetchMarketIndices(),
        fetchETFData(),
        fetchWeiboHotSearch(),
        fetchDouyinHotSearch(),
      ]);
    } else {
      await Promise.all([
        fetchWeiboHotSearch(),
        fetchDouyinHotSearch(),
      ]);
    }
    renderAll(Date.now());
  }, 30000);
}

window.addEventListener('beforeunload', () => {
  clearInterval(updateTimer);
  clearInterval(countdownTimer);
});

init();
</script>
